name: dorian_mobile
version: 0.1.0+1
description: Demo mobile client for the Dorian multi-branch gym platform.
publish_to: 'none'

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.3.1
  http: ^1.5.0
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/dorian-logo.png
    - assets/exercises/front-body.png
    - assets/exercises/back-body.png
    - assets/exercises/front-m-body.png
    - assets/exercises/back-m-body.png
    - assets/fotos adicionales/
    - assets/fotos varias/


